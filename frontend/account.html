
<!DOCTYPE html><html><head>
<meta charset='UTF-8'><title>Account - SCMXpert Lite</title>
<link rel='stylesheet' href='css/global.css'>
<link rel='stylesheet' href='css/sidebar.css'>
</head><body>
<div class='layout'>
<aside class='sidebar'>
<div class='logo'>SCMXpert Lite</div>
<nav class='nav-menu'>
<a href='dashboard.html' class='nav-item'>Dashboard</a>
<a href='account.html' class='nav-item active'>Account</a>
</nav>
</aside>

<main class='main fade'>
<h1 class='page-title'>My Account</h1>

<div class='card' style='max-width:450px;'>
<h3>Profile Details</h3>

<p><b>Email:</b> <span id='emailBox'></span></p>

<button onclick='logout()' style='margin-top:15px;'>Logout</button>
</div>
</main>
</div>

<script src='js/api.js'></script>
<script>
async function load(){
 let me = await apiGet('/auth/me');
 emailBox.innerText = me.email;
}
load();
function logout(){ localStorage.removeItem('token'); window.location='login.html'; }
</script>
</body></html>

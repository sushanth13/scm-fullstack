
<!DOCTYPE html><html><head>
<meta charset='UTF-8'><title>Shipments - SCMXpert Lite</title>
<link rel='stylesheet' href='css/global.css'>
<link rel='stylesheet' href='css/sidebar.css'>
<link rel='stylesheet' href='css/badges.css'>
</head><body>
<div class='layout'>
<aside class='sidebar'>
<div class='logo'>SCMXpert Lite</div>
<nav class='nav-menu'>
<a href='dashboard.html' class='nav-item active'>🏠 Dashboard</a>
<a href='shipments.html' class='nav-item'>📦 Shipments</a>
<a href='create-shipment.html' class='nav-item'>🧾 Create Shipment</a>
<a href='device-data.html' class='nav-item'>📡 Device Data</a>
<a href='account.html' class='nav-item'>⚙️ Account</a>
</nav>
</aside>

<main class='main fade'>
<h1 class='page-title'>Shipments</h1>

<table class='table' id='shipTable'>
<thead><tr>
<th>Name</th><th>Status</th><th>Origin</th><th>Destination</th>
</tr></thead>
<tbody></tbody>
</table>

</main>
</div>
<script src="js/api.js"></script>

<script>
async function load() {
    const token = localStorage.getItem("access_token");
    if (!token) {
        window.location.href = "login.html";
        return;
    }

    const tbody = document.querySelector('#shipTable tbody');
    const shipments = await apiGet('/shipments/'); // ✅ NO /api here

    if (!shipments) return;

    tbody.innerHTML = '';
    shipments.forEach(x => {
        tbody.innerHTML += `
        <tr>
            <td>${x.name ?? '-'}</td>
            <td>
                <span class="badge ${x.status}">
                    ${x.status?.replace('_', ' ') ?? '-'}
                </span>
            </td>
            <td>${x.origin ?? '-'}</td>
            <td>${x.destination ?? '-'}</td>
        </tr>`;
    });
}

load();
</script>


</body></html>

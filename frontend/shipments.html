
<!DOCTYPE html><html><head>
<meta charset='UTF-8'><title>Shipments - SCMXpert Lite</title>
<link rel='stylesheet' href='css/global.css'>
<link rel='stylesheet' href='css/sidebar.css'>
<link rel='stylesheet' href='css/badges.css'>
</head><body>
<div class='layout'>
<aside class='sidebar'>
<div class='logo'>SCMXpert Lite</div>
<nav class='nav-menu'>
<a href='dashboard.html' class='nav-item active'>🏠 Dashboard</a>
<a href='shipments.html' class='nav-item'>📦 Shipments</a>
<a href='create-shipment.html' class='nav-item'>🧾 Create Shipment</a>
<a href='device-data.html' class='nav-item'>📡 Device Data</a>
<a href='account.html' class='nav-item'>⚙️ Account</a>
</nav>
</aside>

<main class='main fade'>
<h1 class='page-title'>Shipments</h1>

<table class='table' id='shipTable'>
<thead><tr>
<th>Shipment no</th><th>Container no</th><th>Routes</th><th>Goods type</th><th>Device ID</th><th>Expected Delivery Date</th><th>PO Number</th><th>Delivery Number</th><th>NDC Number</th><th>Batch ID</th><th>Serial Number</th><th>Description</th>
</tr></thead>
<tbody></tbody>
</table>

</main>
</div>
<script src="js/api.js"></script>
<script>
async function load() {
  const shipments = await apiGet("/shipments/");
  if (!shipments) return;

  const tbody = document.querySelector("#shipTable tbody");
  tbody.innerHTML = "";

  if (shipments.length === 0) {
    tbody.innerHTML = "<tr><td colspan='4'>No shipments found</td></tr>";
    return;
  }

  shipments.forEach(x => {
    tbody.innerHTML += `
      <tr>
        <td>${x.shipmentNumber}</td>
        <td>${x.containerNumber}</td>
        <td>${x.routeDetails}</td>
        <td>${x.goodsType}</td>
        <td>${x.deviceId}</td>
        <td>${x.expectedDeliveryDate}</td>
        <td>${x.poNumber}</td>
        <td>${x.deliveryNumber}</td>
        <td>${x.ndcNumber}</td>
        <td>${x.batchId}</td>
        <td>${x.serialNumber}</td>
        <td>${x.description}</td>
      </tr>`;
  });
}
load();
</script>



</body></html>

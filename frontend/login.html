
<!DOCTYPE html><html><head>
<meta charset='UTF-8'><title>Login - SCMXpert Lite</title>
<link rel='stylesheet' href='css/global.css'>
</head><body style='display:flex;justify-content:center;align-items:center;height:100vh;background:#4b1eaa;'>

<div class='card fade' style='width:350px;background:white;'>
<h2 style='text-align:center;margin-bottom:15px;'>SCMXpert Lite</h2>
<h3>Login</h3>

<form id='form'>
<input id='email' placeholder='Email'>
<input id='password' type='password' placeholder='Password'>
<button>Login</button>
</form>

<p>Don't have an account? <a href='signup.html'>Signup</a></p>
</div>
<script>
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Email and password are required");
    return;
  }

  try {
    const res = await fetch("http://127.0.0.1:8000/api/auth/token", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: new URLSearchParams({
        username: email,
        password: password
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.detail || "Invalid login");
      return;
    }

    // 🔑 THIS IS THE MOST IMPORTANT LINE
    localStorage.setItem("access_token", data.access_token);

    console.log("Saved token:", localStorage.getItem("access_token"));

    window.location.href = "dashboard.html";

  } catch (err) {
    console.error(err);
    alert("Network error");
  }
});
</script>


</body></html>

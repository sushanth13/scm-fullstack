
<!DOCTYPE html><html><head>
<meta charset='UTF-8'><title>Device Data - SCMXpert Lite</title>
<link rel='stylesheet' href='css/global.css'>
<link rel='stylesheet' href='css/sidebar.css'>
</head><body>
<div class='layout'>
<aside class='sidebar'>
<div class='logo'>SCMXpert Lite</div>
<nav class='nav-menu'>
<a href='dashboard.html' class='nav-item active'>🏠 Dashboard</a>
<a href='shipments.html' class='nav-item'>📦 Shipments</a>
<a href='create-shipment.html' class='nav-item'>🧾 Create Shipment</a>
<a href='device-data.html' class='nav-item'>📡 Device Data</a>
<a href='account.html' class='nav-item'>⚙️ Account</a>
</nav>
</aside>

<main class='main fade'>
<h1 class='page-title'>Device Telemetry</h1>

<table class='table' id='DeviceTable'>
<thead><tr>
<th>Device ID</th><th>Battery Level</th><th>First sensor Temperature</th><th>Humidity</th><th>Routes</th><th>Time</th>
</tr></thead>
<tbody></tbody>
</table>

<div id='deviceCards' style='display:flex;gap:20px;flex-wrap:wrap;'></div>

</main>
</div>

<script src="js/api.js"></script>
<script>
async function load() {
  let data = await apiGet('/devices/stream');
  let box = document.getElementById('deviceCards');
  box.innerHTML = '';

  if (!data || data.length === 0) {
    box.innerHTML = '<p>No device data available</p>';
    return;
  }

  data.forEach(d => {
    box.innerHTML += `
      <div style="
        border:1px solid #ddd;
        border-radius:10px;
        padding:15px;
        width:260px;
        background:#fff;
        box-shadow:0 2px 8px rgba(0,0,0,0.08);
      ">
        <h3>📡 Device ${d.Device_ID}</h3>
        <p><b>Battery:</b> ${d.Battery_Level}</p>
        <p><b>Temperature:</b> ${d.First_Sensor_temperature} °C</p>
        <p><b>Humidity:</b> ${d.Humidity}</p>
        <p><b>Route:</b> ${d.Route_From} → ${d.Route_To}</p>
        <p><b>Time:</b> ${new Date(d.Timestamp).toLocaleString()}</p>
      </div>
    `;
  });
}

load();
setInterval(load, 4000);
</script>


</body></html>

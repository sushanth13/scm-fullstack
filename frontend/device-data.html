
<!DOCTYPE html><html><head>
<meta charset='UTF-8'><title>Device Data - SCMXpert Lite</title>
<link rel='stylesheet' href='css/global.css'>
<link rel='stylesheet' href='css/sidebar.css'>
</head><body>
<div class='layout'>
<aside class='sidebar'>
<div class='logo'>SCMXpert Lite</div>
<nav class='nav-menu'>
<a href='dashboard.html' class='nav-item active'>🏠 Dashboard</a>
<a href='shipments.html' class='nav-item'>📦 Shipments</a>
<a href='create-shipment.html' class='nav-item'>🧾 Create Shipment</a>
<a href='device-data.html' class='nav-item'>📡 Device Data</a>
<a href='account.html' class='nav-item'>⚙️ Account</a>
</nav>
</aside>

<main class='main fade'>
<h1 class='page-title'>Device Telemetry</h1>

<table class='table' id='DeviceTable'>
<thead><tr>
<th>Device ID</th><th>Battery Level</th><th>First sensor Temperature</th><th>Humidity</th><th>Routes</th><th>Date</th>
</tr></thead>
<tbody></tbody>
</table>

<div id='deviceCards' style='display:flex;gap:20px;flex-wrap:wrap;'></div>

</main>
</div>

<script src="js/api.js"></script>
<script>
async function load() {
  let data = await apiGet('/device/stream');
  const tbody = document.querySelector('#DeviceTable tbody');
  tbody.innerHTML = '';

  if (!data || data.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="6" style="text-align:center;">No device data available</td></tr>
    `;
    return;
  }

  data.forEach(d => {
    const payload = d.data || {};

    tbody.innerHTML += `
      <tr>
        <td>${d.deviceId}</td>
        <td>${payload.battery ?? '-'}</td>
        <td>${payload.temperature ?? '-'}</td>
        <td>${payload.humidity ?? '-'}</td>
        <td>${payload.routeFrom ?? '-'} → ${payload.routeTo ?? '-'}</td>
        <td>${new Date(d.ts).toLocaleString()}</td>
      </tr>
    `;
  });
}

load();
setInterval(load, 4000);
</script>
</body></html>

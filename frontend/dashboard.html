
<!DOCTYPE html><html><head>
<meta charset='UTF-8'><title>Dashboard - SCMXpert Lite</title>
<link rel='stylesheet' href='css/global.css'>
<link rel='stylesheet' href='css/sidebar.css'>
<link rel='stylesheet' href='css/dashboard.css'>
<link rel='stylesheet' href='css/badges.css'>
</head><body>
<div class='layout'>
<aside class='sidebar'>
<div class='logo'>SCMXpert Lite</div>
<nav class='nav-menu'>
<a href='dashboard.html' class='nav-item active'>🏠 Dashboard</a>
<a href='shipments.html' class='nav-item'>📦 Shipments</a>
<a href='create-shipment.html' class='nav-item'>🧾 Create Shipment</a>
<a href='device-data.html' class='nav-item'>📡 Device Data</a>
<a href='account.html' class='nav-item'>⚙️ Account</a>
</nav>
<a class='logout-btn' onclick='logout()'>Logout</a>
</aside>

<main class='main fade'>
<h1 class='page-title'>Dashboard</h1>

<div class='stats'>
 <div class='stat-card'><h3 id='total'>0</h3><p>Total</p></div>
 <div class='stat-card'><h3 id='delivered'>0</h3><p>Delivered</p></div>
 <div class='stat-card'><h3 id='pending'>0</h3><p>Pending</p></div>
 <div class='stat-card'><h3 id='transit'>0</h3><p>In Transit</p></div>
</div>

</main>
</div>

<script src="js/api.js"></script>
<script>

  const token = localStorage.getItem("token");
  if (!token) {
    window.location.replace("login.html");
  }

  async function load() {
    let s = await apiGet("/shipments/");
    document.getElementById("total").innerText = s.length;
    document.getElementById("delivered").innerText = s.filter(x => x.status === "delivered").length;
    document.getElementById("pending").innerText = s.filter(x => x.status === "pending").length;
    document.getElementById("transit").innerText = s.filter(x => x.status === "in_transit").length;
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.replace("login.html");
  }

  load();
</script>



</body></html>

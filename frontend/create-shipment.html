<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Shipment - SCMXpert</title>
  <link rel="stylesheet" href="css/global.css?v=6">
  <link rel="stylesheet" href="css/sidebar.css?v=6">
  <style>
    .content-hero {
      position: relative;
      margin: 16px var(--page-gutter-x, 30px) 28px;
      padding: 24px;
      border-radius: 24px;
      background:
        radial-gradient(circle at left top, rgba(255, 115, 127, 0.3), transparent 26%),
        radial-gradient(circle at left center, rgba(255, 115, 127, 0.16), transparent 34%),
        radial-gradient(circle at right top, rgba(255, 193, 125, 0.22), transparent 22%),
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,250,247,0.96));
      box-shadow: 0 18px 44px rgba(59, 79, 146, 0.08);
      overflow: hidden;
    }

    .content-hero::before {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      left: -180px;
      top: 46px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 118, 118, 0.58), rgba(255, 141, 115, 0.24), transparent 72%);
      filter: blur(6px);
      opacity: 0.9;
    }

    .content-hero::after {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      left: -80px;
      bottom: -190px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 185, 142, 0.44), rgba(255, 132, 132, 0.12), transparent 74%);
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 18px;
    }

    .hero-copy h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: #171717;
    }

    .hero-copy p {
      margin: 8px 0 0;
      font-size: 12px;
      color: #7b7883;
    }

    .form-card {
      position: relative;
      z-index: 1;
      width: min(860px, 100%);
      margin: 0 auto;
      background: rgba(255, 251, 247, 0.95);
      border-radius: 10px;
      border: 1px solid rgba(216, 209, 204, 0.88);
      padding: 22px 26px 26px;
      box-shadow: 0 22px 50px rgba(122, 109, 100, 0.08);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 26px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #6a6260;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 0;
      border-radius: 2px;
      background: #f0f0f0;
      font-size: 13px;
      color: #2e2d30;
    }

    .form-group textarea {
      height: 72px;
      padding-top: 10px;
      resize: none;
    }

    .actions {
      display: flex;
      justify-content: space-around;
      gap: 20px;
      margin-top: 18px;
    }

    .btn-primary,
    .btn-danger {
      min-width: 170px;
      height: 34px;
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 10px 18px rgba(64, 88, 203, 0.18);
    }

    .btn-primary {
      background: linear-gradient(180deg, #3d8dff, #2b74ff);
    }

    .btn-danger {
      background: linear-gradient(180deg, #ff5a4f, #ff4157);
    }

    @media (max-width: 900px) {
      .form-grid { grid-template-columns: 1fr; }
      .actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo"><span class="brand-text">SCMXpert</span><button class="sidebar-toggle" type="button" aria-label="Toggle sidebar"></button></div>
    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon icon-dashboard"></span><span class="nav-text">Dashboard</span></a>
      <a href="account.html" class="nav-item"><span class="nav-icon icon-account"></span><span class="nav-text">My Account</span></a>
      <a href="shipments.html" class="nav-item"><span class="nav-icon icon-shipment"></span><span class="nav-text">My Shipment</span></a>
      <a href="create-shipment.html" class="nav-item active"><span class="nav-icon icon-new"></span><span class="nav-text">New Shipment</span></a>
      <a href="device-data.html" class="nav-item"><span class="nav-icon icon-device"></span><span class="nav-text">Device Data</span></a>
      <a href="admin.html" class="nav-item" id="adminLink" style="display:none;"><span class="nav-icon icon-home"></span><span class="nav-text">Admin</span></a>
    </nav>
    <a class="logout-btn" onclick="logout()"><span class="logout-icon icon-logout"></span><span class="logout-text">Log out</span></a>
  </aside>

  <main class="main fade">
    <div class="topbar">
      <h1 class="page-title" id="welcomeTitle">Hi User, Welcome to SCMXpert</h1>
    </div>

    <div class="content-hero">
      <div class="hero-copy">
        <h2>Create New Shipment</h2>
        <p>Please fill all the details.</p>
      </div>

      <div class="form-card">
        <form id="shipmentForm">
          <div class="form-grid">
            <div class="form-group">
              <label>Shipment Number*</label>
              <input id="shipmentNumber" placeholder="Shipment Number" required>
            </div>

            <div class="form-group">
              <label>Container Number*</label>
              <input id="containerNumber" placeholder="Container Number" required>
            </div>

            <div class="form-group">
              <label>Route Details*</label>
              <select id="routeDetails" required>
                <option value="">Select Route</option>
                <option>Hyderabad -> Mumbai</option>
                <option>Mumbai -> Dubai</option>
                <option>Dubai -> USA</option>
                <option>USA -> Hyderabad</option>
              </select>
            </div>

            <div class="form-group">
              <label>Goods Type*</label>
              <select id="goodsType" required>
                <option value="">Select Goods</option>
                <option>Pharmaceuticals</option>
                <option>Electronics</option>
                <option>Food</option>
              </select>
            </div>

            <div class="form-group">
              <label>Device*</label>
              <select id="deviceId" required>
                <option value="">Select Device</option>
              </select>
            </div>

            <div class="form-group">
              <label>Expected Delivery Date*</label>
              <input type="date" id="expectedDeliveryDate" required>
            </div>

            <div class="form-group">
              <label>PO Number*</label>
              <input id="poNumber" placeholder="PO Number" required>
            </div>

            <div class="form-group">
              <label>Delivery Number*</label>
              <input id="deliveryNumber" placeholder="Delivery Number" required>
            </div>

            <div class="form-group">
              <label>NDC Number*</label>
              <input id="ndcNumber" placeholder="NDC Number" required>
            </div>

            <div class="form-group">
              <label>Batch Id*</label>
              <input id="batchId" placeholder="Batch Id" required>
            </div>

            <div class="form-group">
              <label>Serial number of Goods*</label>
              <input id="serialNumber" placeholder="Serial number of Goods" required>
            </div>

            <div class="form-group">
              <label>Shipment Description*</label>
              <textarea id="description" placeholder="Shipment Description" required></textarea>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn-primary">Create Shipment</button>
            <button type="reset" class="btn-danger">Clear Details</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/sidebar.js?v=4"></script>
<script>
function generateRandomDeviceId() {
  const charsArray = "123456789";
  const lengthOtp = 5;
  let digits = "";

  for (let j = 0; j < lengthOtp; j += 1) {
    const index = Math.floor(Math.random() * charsArray.length);
    digits += charsArray[index];
  }

  return digits;
}

function populateDeviceOptions() {
  const deviceSelect = document.getElementById("deviceId");
  if (!deviceSelect) return;

  const devices = new Set();
  while (devices.size < 6) {
    devices.add(generateRandomDeviceId());
  }

  deviceSelect.innerHTML = "<option value=''>Select Device</option>";
  devices.forEach((device) => {
    const option = document.createElement("option");
    option.value = device;
    option.textContent = device;
    deviceSelect.appendChild(option);
  });
}

function formatName(me) {
  if (me?.name && me.name.trim()) return me.name.trim();
  if (me?.email) return me.email.split("@")[0];
  return "User";
}

async function bootstrap() {
  const me = await apiGet("/auth/me");
  if (!me) return;
  document.getElementById("welcomeTitle").innerText = `Hi ${formatName(me)}, Welcome to SCMXpert`;
  const adminLink = document.getElementById("adminLink");
  if (isPrivilegedRole(me.role) && adminLink) {
    adminLink.style.display = "flex";
  }

  populateDeviceOptions();
}

async function logout() {
  try {
    await apiPost("/auth/logout", {});
  } catch (error) {
    console.error("Logout tracking failed", error);
  } finally {
    sessionStorage.removeItem("access_token");
    localStorage.removeItem("access_token");
    window.location.href = "login.html";
  }
}

document.getElementById("shipmentForm").onsubmit = async (e) => {
  e.preventDefault();

  const payload = {
    shipmentNumber: shipmentNumber.value,
    containerNumber: containerNumber.value,
    routeDetails: routeDetails.value,
    goodsType: goodsType.value,
    deviceId: deviceId.value,
    expectedDeliveryDate: expectedDeliveryDate.value,
    poNumber: poNumber.value,
    deliveryNumber: deliveryNumber.value,
    ndcNumber: ndcNumber.value,
    batchId: batchId.value,
    serialNumber: serialNumber.value,
    description: description.value
  };

  await apiPost("/shipments/", payload);
  alert("Shipment Created Successfully");
  window.location = "shipments.html";
};

document.getElementById("shipmentForm").addEventListener("reset", () => {
  setTimeout(populateDeviceOptions, 0);
});

bootstrap();
</script>
</body>
</html>

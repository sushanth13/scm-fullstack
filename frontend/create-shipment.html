<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create New Shipment</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <style>
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-size: 13px;
      margin-bottom: 4px;
      color: #555;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    textarea {
      resize: none;
      height: 80px;
    }
    .actions {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .btn-primary {
      background: #2f6df6;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
    }
    .btn-danger {
      background: #e53935;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">SCMXpert Lite</div>
    <nav class="nav-menu">
    <a href='dashboard.html' class='nav-item active'>🏠 Dashboard</a>
    <a href='shipments.html' class='nav-item'>📦 Shipments</a>
    <a href='create-shipment.html' class='nav-item'>🧾 Create Shipment</a>
    <a href='device-data.html' class='nav-item'>📡 Device Data</a>
    <a href='account.html' class='nav-item'>⚙️ Account</a>
    </nav>
  </aside>

  <main class="main fade">
    <h1 class="page-title">Create New Shipment</h1>
    <p>Please fill all the details.</p>

    <div class="card">
      <form id="shipmentForm">

        <div class="form-grid">
          <div class="form-group">
            <label>Shipment Number*</label>
            <input id="shipmentNumber" required>
          </div>

          <div class="form-group">
            <label>Container Number*</label>
            <input id="containerNumber" required>
          </div>

          <div class="form-group">
            <label>Route Details*</label>
            <select id="routeDetails" required>
              <option value="">Select Route</option>
              <option>Hyderabad → Mumbai</option>
              <option>Mumbai → Dubai</option>
            </select>
          </div>

          <div class="form-group">
            <label>Goods Type*</label>
            <select id="goodsType" required>
              <option value="">Select Goods</option>
              <option>Pharmaceuticals</option>
              <option>Electronics</option>
              <option>Food</option>
            </select>
          </div>

          <div class="form-group">
            <label>Device*</label>
            <select id="deviceId" required>
              <option value="">Select Device</option>
              <option value="DEV001">DEV001</option>
              <option value="DEV002">DEV002</option>
            </select>
          </div>

          <div class="form-group">
            <label>Expected Delivery Date*</label>
            <input type="date" id="expectedDeliveryDate" required>
          </div>

          <div class="form-group">
            <label>PO Number*</label>
            <input id="poNumber" required>
          </div>

          <div class="form-group">
            <label>Delivery Number*</label>
            <input id="deliveryNumber" required>
          </div>

          <div class="form-group">
            <label>NDC Number*</label>
            <input id="ndcNumber" required>
          </div>

          <div class="form-group">
            <label>Batch ID*</label>
            <input id="batchId" required>
          </div>

          <div class="form-group">
            <label>Serial Number of Goods*</label>
            <input id="serialNumber" required>
          </div>

          <div class="form-group">
            <label>Shipment Description*</label>
            <textarea id="description" required></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">CREATE SHIPMENT</button>
          <button type="reset" class="btn-danger">CLEAR DETAILS</button>
        </div>

      </form>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById("shipmentForm").onsubmit = async (e) => {
  e.preventDefault();

  const payload = {
    shipmentNumber: shipmentNumber.value,
    containerNumber: containerNumber.value,
    routeDetails: routeDetails.value,
    goodsType: goodsType.value,
    deviceId: deviceId.value,
    expectedDeliveryDate: expectedDeliveryDate.value,
    poNumber: poNumber.value,
    deliveryNumber: deliveryNumber.value,
    ndcNumber: ndcNumber.value,
    batchId: batchId.value,
    serialNumber: serialNumber.value,
    description: description.value
  };

  await apiPost("/shipments/", payload);
  alert("Shipment Created Successfully");
  window.location = "shipments.html";
};
</script>
</body>
</html>

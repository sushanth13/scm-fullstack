services:
  kafka:
    image: bitnamilegacy/kafka:3.6.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
    command:
      - bash
      - -ec
      - |
          /opt/bitnami/scripts/kafka/run.sh &
          sleep 10
          /opt/bitnami/kafka/bin/kafka-topics.sh --create --if-not-exists --topic sensor_data --bootstrap-server localhost:9092 --partitions 1 --replication-factor 1
          wait
    healthcheck:
      test: ["CMD", "/opt/bitnami/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/fullstack-app
      - ./frontend:/fullstack-app/frontend
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb+srv://janasushanth_db_user:jssushanth@cluster0.a4jzzou.mongodb.net/
      DB_NAME: scmxpertlite
      FRONTEND_DIR: /fullstack-app/frontend
    depends_on:
      kafka:
        condition: service_healthy

  producer:
    build:
      context: ./kafka_apps
      dockerfile: Dockerfile.producer
    container_name: kafka-producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./kafka_apps:/app

  consumer:
    build:
      context: ./kafka_apps
      dockerfile: Dockerfile.consumer
    container_name: kafka-consumer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:9092
    volumes:
      - ./kafka_apps:/app
